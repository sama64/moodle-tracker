services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: uni_tracker
      POSTGRES_USER: uni_tracker
      POSTGRES_PASSWORD: uni_tracker
    volumes:
      - uni_tracker_postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    mem_limit: 384m
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ./data/uni-tracker:/app/data/uni-tracker
      - ./data/uni-tracker/artifacts/runtime:/app/artifacts/runtime
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
    command: >
      bash -lc "alembic upgrade head &&
      uvicorn uni_tracker.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      FILE_DOWNLOAD_LIMIT_PER_RUN: "1"
      MAX_FILE_EXTRACT_BYTES: "5000000"
      PDF_EXTRACTION_TIMEOUT_SECONDS: "15"
      PDF_EXTRACTION_MEMORY_LIMIT_MB: "192"
    volumes:
      - ./data/uni-tracker:/app/data/uni-tracker
      - ./data/uni-tracker/artifacts/runtime:/app/artifacts/runtime
    depends_on:
      - db
    command: >
      bash -lc "alembic upgrade head &&
      python -m uni_tracker.worker"

volumes:
  uni_tracker_postgres_data:
